<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pickle Survivor</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      overflow: hidden; font-family: 'Nunito', sans-serif; background: #1a1a2e;
      touch-action: none; -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
    }
    canvas { display: block; touch-action: none; }

    /* ─── Combo counter ─── */
    #hud-combo {
      display: none; font-size: 28px; font-weight: 900; color: #ffd54f;
      text-shadow: 0 2px 8px rgba(255,213,79,.6), 0 0 16px rgba(255,213,79,.3);
      margin-bottom: 4px; transition: transform .15s ease;
    }
    @keyframes comboPulse { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
    #hud-combo.combo-pulse { animation: comboPulse .2s ease-out; }

    /* ─── Boss warning ─── */
    #boss-warning {
      display: none; font-size: 22px; font-weight: 900; color: #ff4444;
      text-shadow: 0 0 12px rgba(255,68,68,.8), 0 2px 6px rgba(0,0,0,.5);
      animation: bossWarnPulse .5s ease-in-out infinite alternate;
    }
    @keyframes bossWarnPulse { from { opacity: .7; transform: scale(1); } to { opacity: 1; transform: scale(1.05); } }

    /* ─── Weapon unlock flash ─── */
    #weapon-unlock {
      display: none; font-size: 18px; font-weight: 900; color: #64ffda;
      text-shadow: 0 0 12px rgba(100,255,218,.8), 0 2px 6px rgba(0,0,0,.5);
      animation: weaponUnlockAnim 2s ease-out forwards;
    }
    @keyframes weaponUnlockAnim {
      0%   { opacity: 0; transform: translateY(8px) scale(0.9); }
      15%  { opacity: 1; transform: translateY(0) scale(1.1); }
      30%  { transform: scale(1); }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ─── Damage flash ─── */
    #damage-flash {
      position: fixed; inset: 0; pointer-events: none; z-index: 8;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.45) 100%);
      opacity: 0; transition: opacity 0.4s ease;
    }

    /* ─── Low HP danger vignette ─── */
    #danger-vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 7;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(255,0,0,0.6) 100%);
      opacity: 0; transition: opacity 0.3s ease;
    }
    #danger-vignette.danger-1 { opacity: 0.15; }
    #danger-vignette.danger-2 { opacity: 0.35; animation: dangerPulse 0.8s ease-in-out infinite alternate; }
    #danger-vignette.danger-3 { opacity: 0.55; animation: dangerPulse 0.5s ease-in-out infinite alternate; }
    @keyframes dangerPulse { from { opacity: 0.4; } to { opacity: 0.7; } }

    /* ─── HUD ─── */
    #hud {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: max(14px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
               14px max(20px, env(safe-area-inset-left));
      display: none; z-index: 10; pointer-events: none;
    }
    #hud-top {
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    #hud-left { display: flex; flex-direction: column; gap: 6px; }
    #hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; color: #fff; font-weight: 700; font-size: 18px; text-shadow: 0 2px 6px rgba(0,0,0,.5); }
    .bar-wrap {
      width: 220px; height: 18px; border-radius: 10px; overflow: hidden;
      background: rgba(0,0,0,.4); border: 2px solid rgba(255,255,255,.25);
    }
    .bar-fill { height: 100%; border-radius: 8px; transition: width .3s ease; }
    #hp-bar .bar-fill { background: linear-gradient(90deg, #ff6b9d, #ff4081); }
    #xp-bar .bar-fill { background: linear-gradient(90deg, #64ffda, #00e5ff); }
    #hp-label, #xp-label {
      font-size: 12px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,.6); margin-bottom: 1px;
    }

    /* ─── Start Screen ─── */
    #start-screen {
      position: fixed; inset: 0; z-index: 100; padding: 16px; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #f3e5f5 100%);
    }
    #start-screen h1 {
      font-size: clamp(32px, 10vw, 64px); font-weight: 900; color: #e91e63;
      width: 100%; overflow-wrap: break-word;
      text-shadow: 0 4px 20px rgba(233,30,99,.3); margin-bottom: 8px;
    }
    #start-screen p { font-size: 20px; color: #7c4dff; margin-bottom: 32px; }
    .btn {
      font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900;
      padding: 14px 48px; border: none; border-radius: 50px; cursor: pointer;
      color: #fff; transition: transform .15s, box-shadow .15s; pointer-events: auto;
    }
    .btn:hover { transform: scale(1.08); }
    .btn-pink { background: linear-gradient(135deg, #ff6b9d, #e91e63); box-shadow: 0 6px 24px rgba(233,30,99,.4); }
    .btn-mint { background: linear-gradient(135deg, #64ffda, #00bfa5); box-shadow: 0 6px 24px rgba(0,191,165,.4); color: #004d40; }

    /* ─── Game Over Screen ─── */
    #gameover-screen {
      position: fixed; inset: 0; z-index: 100; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, .85);
    }
    #gameover-screen h1 { font-size: 52px; font-weight: 900; color: #ff6b9d; margin-bottom: 12px; }
    #gameover-stats { color: #e0e0e0; font-size: 20px; text-align: center; line-height: 1.8; margin-bottom: 24px; }
    #gameover-stats span { color: #64ffda; font-weight: 900; }
    #high-score-msg { color: #ffd54f; font-size: 22px; font-weight: 900; margin-bottom: 16px; display: none; }

    /* ─── Pause Screen ─── */
    #pause-screen {
      position: fixed; inset: 0; z-index: 90; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, .7);
    }
    #pause-screen h1 { font-size: 48px; font-weight: 900; color: #b388ff; }
    #pause-screen p { font-size: 18px; color: #e0e0e0; margin-top: 12px; }

    /* ─── Upgrade Screen ─── */
    #upgrade-screen {
      position: fixed; inset: 0; z-index: 80; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, .8);
    }
    #upgrade-screen h2 { font-size: 36px; font-weight: 900; color: #ffd54f; margin-bottom: 24px; text-shadow: 0 3px 12px rgba(255,213,79,.4); }
    #upgrade-choices { display: flex; gap: 20px; }
    .upgrade-card {
      background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      border: 2px solid rgba(255,255,255,.2); border-radius: 20px;
      padding: 28px 24px; width: 180px; text-align: center; cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s; pointer-events: auto;
    }
    .upgrade-card:hover { transform: scale(1.08) rotate(-2deg); border-color: #ffd54f; box-shadow: 0 0 24px rgba(255,213,79,.3); }
    .upgrade-card .icon { font-size: 40px; margin-bottom: 10px; }
    .upgrade-card .name { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .upgrade-card .desc { font-size: 13px; color: #b0bec5; }

    @keyframes cardPop {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      70% { transform: scale(1.1) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .upgrade-card { animation: cardPop .4s ease-out backwards; }
    .upgrade-card:nth-child(1) { animation-delay: .05s; }
    .upgrade-card:nth-child(2) { animation-delay: .15s; }
    .upgrade-card:nth-child(3) { animation-delay: .25s; }

    @keyframes levelUpBanner {
      0% { transform: scale(0.3) rotate(-5deg); opacity: 0; }
      60% { transform: scale(1.1) rotate(1deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    #upgrade-screen h2 { animation: levelUpBanner .5s ease-out; }

    @keyframes fadeSlideIn {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    #start-screen h1 { animation: levelUpBanner .6s ease-out; }
    #start-screen p { animation: fadeSlideIn .6s ease-out .2s backwards; }
    #start-screen .btn { animation: cardPop .5s ease-out .4s backwards; }

    #gameover-screen h1 { animation: levelUpBanner .5s ease-out; }
    #gameover-screen .btn { animation: cardPop .5s ease-out .3s backwards; }

    /* ─── Mobile / Touch Controls ─── */
    #pause-btn {
      position: fixed; top: max(14px, env(safe-area-inset-top));
      right: max(16px, env(safe-area-inset-right)); z-index: 11; display: none;
      width: 46px; height: 46px; border-radius: 50%; border: 2px solid rgba(255,255,255,.4);
      background: rgba(0,0,0,.35); color: #fff; font-size: 20px; font-weight: 900;
      cursor: pointer; pointer-events: auto; line-height: 1;
    }
    #joystick {
      position: fixed; z-index: 9; width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: 2px solid rgba(255,255,255,.25);
      display: none; pointer-events: none; transform: translate(-50%, -50%);
    }
    #joystick-knob {
      position: absolute; left: 50%; top: 50%; width: 54px; height: 54px;
      border-radius: 50%; background: rgba(255,255,255,.5);
      border: 2px solid rgba(255,255,255,.7); transform: translate(-50%, -50%);
    }

    /* ─── Starting weapon picker ─── */
    #weapon-select { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 26px; max-width: 100%; }
    .wsel-title { color: #7c4dff; font-size: 14px; font-weight: 700; }
    #weapon-options { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
    .weapon-card {
      background: rgba(255,255,255,.5); border: 2px solid rgba(124,77,255,.25);
      border-radius: 16px; padding: 12px 14px; width: 140px; text-align: center;
      cursor: pointer; pointer-events: auto;
      transition: transform .15s, border-color .15s, background .15s, box-shadow .15s;
    }
    .weapon-card:hover { transform: translateY(-3px); }
    .weapon-card.selected {
      border-color: #e91e63; background: rgba(255,255,255,.9);
      box-shadow: 0 4px 16px rgba(233,30,99,.25);
    }
    .weapon-card .wicon { font-size: 28px; }
    .weapon-card .wname { font-size: 14px; font-weight: 900; color: #5e35b1; margin-top: 4px; }
    .weapon-card .wdesc { font-size: 11px; color: #9575cd; margin-top: 2px; }
    .weapon-card .wtooltip {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(124,77,255,.15);
      text-align: left; font-size: 10px; color: #7c4dff; line-height: 1.4;
      max-height: 60px; overflow: hidden;
      transition: max-height .3s ease;
    }
    .weapon-card:hover .wtooltip, .weapon-card.selected .wtooltip {
      max-height: 120px; font-size: 11px;
    }
    .weapon-card .wtt-desc { color: #5e35b1; font-style: italic; margin-bottom: 3px; }
    .weapon-card .wtt-stats { color: #e91e63; font-weight: 700; margin-bottom: 2px; }
    .weapon-card .wtt-path { color: #00897b; font-weight: 600; }

    /* ─── Camera angle control ─── */
    #cam-control {
      position: fixed; right: max(14px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom)); z-index: 11; display: none;
      align-items: center; gap: 8px; padding: 7px 12px;
      background: rgba(0,0,0,.3); border: 2px solid rgba(255,255,255,.25);
      border-radius: 24px; pointer-events: auto;
    }
    .cam-ico { font-size: 16px; }
    #cam-slider { width: 110px; accent-color: #ff6b9d; pointer-events: auto; }

    /* Keep the HUD timer/kills clear of the pause button on touch devices */
    body.touch #hud-right { margin-right: 52px; }

    /* ─── Loadout panel (weapons + upgrades, like Vampire Survivors) ─── */
    #loadout { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; max-width: 188px; }
    .lo-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; padding: 3px 8px; color: #fff;
      font-size: 12px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }
    .lo-chip.lo-weapon { border-color: rgba(255,213,79,.5); }
    .lo-chip.lo-active { border-color: #ffd54f; background: rgba(255,213,79,.2); box-shadow: 0 0 8px rgba(255,213,79,.3); }
    .lo-chip .lo-ic { font-size: 15px; line-height: 1; }
    .lo-chip .lo-nm { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lo-chip .lo-lv { color: #ffd54f; font-weight: 900; }
    .lo-chip .lo-kills { color: #b0bec5; font-size: 10px; font-weight: 700; }
    @media (max-width: 560px) {
      #loadout { max-width: 150px; gap: 3px; }
      .lo-chip { font-size: 11px; padding: 2px 6px; }
    }

    /* ─── Weapon Switcher ─── */
    #weapon-switcher {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .ws-btn {
      width: 38px; height: 38px; border-radius: 10px; border: 2px solid rgba(255,255,255,.2);
      background: rgba(0,0,0,.35); font-size: 18px; cursor: pointer;
      pointer-events: auto; transition: border-color .15s, background .15s, transform .15s;
      opacity: 0.4;
    }
    .ws-btn.ws-owned { opacity: 1; }
    .ws-btn.ws-active {
      border-color: #ffd54f; background: rgba(255,213,79,.25);
      box-shadow: 0 0 10px rgba(255,213,79,.4); transform: scale(1.1);
    }
    .ws-btn:disabled { cursor: default; }

    /* ─── Dash indicator ─── */
    #dash-indicator {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; color: #80d8ff;
      text-shadow: 0 1px 4px rgba(0,0,0,.6); margin-top: 6px;
      transition: color .2s, text-shadow .2s;
    }
    #dash-indicator.cooldown {
      color: #546e7a; text-shadow: none;
    }
    #dash-bar {
      width: 50px; height: 5px; border-radius: 3px;
      background: rgba(255,255,255,.2); overflow: hidden;
    }
    #dash-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #80d8ff, #00e5ff);
      transition: width .1s linear;
    }
    #dash-indicator.cooldown #dash-bar-fill {
      background: #546e7a;
    }

    /* ─── Small screens ─── */
    @media (max-width: 560px) {
      #start-screen p { font-size: 16px; margin-bottom: 22px; }
      #gameover-screen h1 { font-size: 38px; }
      #gameover-stats { font-size: 17px; }
      .bar-wrap { width: 150px; height: 16px; }
      #hud-right { font-size: 15px; }
      #upgrade-choices { gap: 12px; flex-wrap: wrap; justify-content: center; }
      .upgrade-card { width: 130px; padding: 18px 14px; }
      .upgrade-card .icon { font-size: 32px; }
      .upgrade-card .name { font-size: 15px; }
      .btn { font-size: 20px; padding: 12px 36px; }
      #weapon-options { gap: 8px; }
      .weapon-card { width: 92px; padding: 10px; }
      .weapon-card .wicon { font-size: 24px; }
      #cam-slider { width: 84px; }
    }
  </style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <h1>Pickle Survivor</h1>
  <p>I'm Pickle Riiick! Survive the onslaught!</p>
  <div id="start-highscore" style="color:#7c4dff;font-size:16px;margin-bottom:16px;"></div>
  <div id="weapon-select">
    <div class="wsel-title">Choose your starting weapon</div>
    <div id="weapon-options"></div>
  </div>
  <button class="btn btn-pink" id="start-btn">Play!</button>
  <p style="font-size:13px;color:#b39ddb;margin-top:16px;">WASD / drag to move &bull; Auto-attack &bull; ESC / II to pause</p>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-top">
    <div id="hud-left">
      <div id="hud-combo"></div>
      <div id="hp-label">HP</div>
      <div class="bar-wrap" id="hp-bar"><div class="bar-fill" style="width:100%"></div></div>
      <div id="xp-label">XP — Lv 1</div>
      <div class="bar-wrap" id="xp-bar"><div class="bar-fill" style="width:0%"></div></div>
      <div id="loadout"></div>
    </div>
    <div id="hud-right">
      <div id="boss-warning"></div>
      <div id="boss-hud-bar" style="display:none">
        <div id="boss-hud-label" style="font-size:11px;font-weight:700;color:#ffd54f;text-shadow:0 1px 4px rgba(0,0,0,.6);margin-bottom:1px;"></div>
        <div class="bar-wrap" id="boss-hp-bar"><div class="bar-fill" style="width:100%;background:linear-gradient(90deg,#ff4444,#ff6b00);"></div></div>
        <div id="boss-enrage" style="display:none;font-size:11px;font-weight:900;color:#ff4444;text-shadow:0 0 8px rgba(255,0,0,.8);animation:bossWarnPulse .5s ease-in-out infinite alternate;">ENRAGED!</div>
      </div>
      <div id="hud-time">00:00</div>
      <div id="hud-kills">Kills: 0</div>
      <div id="weapon-switcher"></div>
      <div id="weapon-unlock"></div>
      <div id="dash-indicator">
        <span>⚡</span>
        <div id="dash-bar"><div id="dash-bar-fill" style="width:100%"></div></div>
        <span id="dash-key">Space</span>
      </div>
    </div>
  </div>
</div>

<!-- Touch Controls -->
<button id="pause-btn" aria-label="Pause">II</button>
<div id="joystick"><div id="joystick-knob"></div></div>

<!-- Camera angle control -->
<div id="cam-control">
  <span class="cam-ico" title="Camera angle">📷</span>
  <input type="range" id="cam-slider" min="0" max="100" value="35" aria-label="Camera angle" />
  <span class="cam-ico" title="Top-down">🛰️</span>
</div>

<!-- Pause Screen -->
<div id="pause-screen">
  <h1>Paused</h1>
  <p>Tap anywhere &bull; or ESC / P to resume</p>
</div>

<!-- Upgrade Screen -->
<div id="upgrade-screen">
  <h2>Level Up!</h2>
  <div id="upgrade-choices"></div>
</div>

<!-- Game Over Screen -->
<div id="gameover-screen">
  <h1>Game Over!</h1>
  <div id="gameover-stats"></div>
  <div id="high-score-msg">New High Score!</div>
  <button class="btn btn-mint" id="restart-btn">Play Again</button>
</div>

<div id="damage-flash"></div>
<div id="danger-vignette"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
