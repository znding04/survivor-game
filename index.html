<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Survivors!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Nunito', sans-serif; background: #1a1a2e; }
    canvas { display: block; }

    /* ─── HUD ─── */
    #hud {
      position: fixed; top: 0; left: 0; width: 100%; padding: 14px 20px;
      display: none; z-index: 10; pointer-events: none;
    }
    #hud-top {
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    #hud-left { display: flex; flex-direction: column; gap: 6px; }
    #hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; color: #fff; font-weight: 700; font-size: 18px; text-shadow: 0 2px 6px rgba(0,0,0,.5); }
    .bar-wrap {
      width: 220px; height: 18px; border-radius: 10px; overflow: hidden;
      background: rgba(0,0,0,.4); border: 2px solid rgba(255,255,255,.25);
    }
    .bar-fill { height: 100%; border-radius: 8px; transition: width .3s ease; }
    #hp-bar .bar-fill { background: linear-gradient(90deg, #ff6b9d, #ff4081); }
    #xp-bar .bar-fill { background: linear-gradient(90deg, #64ffda, #00e5ff); }
    #hp-label, #xp-label {
      font-size: 12px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,.6); margin-bottom: 1px;
    }

    /* ─── Start Screen ─── */
    #start-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #f3e5f5 100%);
    }
    #start-screen h1 {
      font-size: 64px; font-weight: 900; color: #e91e63;
      text-shadow: 0 4px 20px rgba(233,30,99,.3); margin-bottom: 8px;
    }
    #start-screen p { font-size: 20px; color: #7c4dff; margin-bottom: 32px; }
    .btn {
      font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900;
      padding: 14px 48px; border: none; border-radius: 50px; cursor: pointer;
      color: #fff; transition: transform .15s, box-shadow .15s; pointer-events: auto;
    }
    .btn:hover { transform: scale(1.08); }
    .btn-pink { background: linear-gradient(135deg, #ff6b9d, #e91e63); box-shadow: 0 6px 24px rgba(233,30,99,.4); }
    .btn-mint { background: linear-gradient(135deg, #64ffda, #00bfa5); box-shadow: 0 6px 24px rgba(0,191,165,.4); color: #004d40; }

    /* ─── Game Over Screen ─── */
    #gameover-screen {
      position: fixed; inset: 0; z-index: 100; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, .85);
    }
    #gameover-screen h1 { font-size: 52px; font-weight: 900; color: #ff6b9d; margin-bottom: 12px; }
    #gameover-stats { color: #e0e0e0; font-size: 20px; text-align: center; line-height: 1.8; margin-bottom: 24px; }
    #gameover-stats span { color: #64ffda; font-weight: 900; }
    #high-score-msg { color: #ffd54f; font-size: 22px; font-weight: 900; margin-bottom: 16px; display: none; }

    /* ─── Pause Screen ─── */
    #pause-screen {
      position: fixed; inset: 0; z-index: 90; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, .7);
    }
    #pause-screen h1 { font-size: 48px; font-weight: 900; color: #b388ff; }
    #pause-screen p { font-size: 18px; color: #e0e0e0; margin-top: 12px; }

    /* ─── Upgrade Screen ─── */
    #upgrade-screen {
      position: fixed; inset: 0; z-index: 80; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, .8);
    }
    #upgrade-screen h2 { font-size: 36px; font-weight: 900; color: #ffd54f; margin-bottom: 24px; text-shadow: 0 3px 12px rgba(255,213,79,.4); }
    #upgrade-choices { display: flex; gap: 20px; }
    .upgrade-card {
      background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      border: 2px solid rgba(255,255,255,.2); border-radius: 20px;
      padding: 28px 24px; width: 180px; text-align: center; cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s; pointer-events: auto;
    }
    .upgrade-card:hover { transform: scale(1.08) rotate(-2deg); border-color: #ffd54f; box-shadow: 0 0 24px rgba(255,213,79,.3); }
    .upgrade-card .icon { font-size: 40px; margin-bottom: 10px; }
    .upgrade-card .name { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .upgrade-card .desc { font-size: 13px; color: #b0bec5; }

    @keyframes cardPop {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      70% { transform: scale(1.1) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .upgrade-card { animation: cardPop .4s ease-out backwards; }
    .upgrade-card:nth-child(1) { animation-delay: .05s; }
    .upgrade-card:nth-child(2) { animation-delay: .15s; }
    .upgrade-card:nth-child(3) { animation-delay: .25s; }

    @keyframes levelUpBanner {
      0% { transform: scale(0.3) rotate(-5deg); opacity: 0; }
      60% { transform: scale(1.1) rotate(1deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    #upgrade-screen h2 { animation: levelUpBanner .5s ease-out; }
  </style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <h1>Cute Survivors!</h1>
  <p>Survive the adorable onslaught!</p>
  <button class="btn btn-pink" id="start-btn">Play!</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-top">
    <div id="hud-left">
      <div id="hp-label">HP</div>
      <div class="bar-wrap" id="hp-bar"><div class="bar-fill" style="width:100%"></div></div>
      <div id="xp-label">XP — Lv 1</div>
      <div class="bar-wrap" id="xp-bar"><div class="bar-fill" style="width:0%"></div></div>
    </div>
    <div id="hud-right">
      <div id="hud-time">00:00</div>
      <div id="hud-kills">Kills: 0</div>
    </div>
  </div>
</div>

<!-- Pause Screen -->
<div id="pause-screen">
  <h1>Paused</h1>
  <p>Press ESC or P to resume</p>
</div>

<!-- Upgrade Screen -->
<div id="upgrade-screen">
  <h2>Level Up!</h2>
  <div id="upgrade-choices"></div>
</div>

<!-- Game Over Screen -->
<div id="gameover-screen">
  <h1>Game Over!</h1>
  <div id="gameover-stats"></div>
  <div id="high-score-msg">New High Score!</div>
  <button class="btn btn-mint" id="restart-btn">Play Again</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

/* ═══════════════════════════════════════════
   GAME STATE
   ═══════════════════════════════════════════ */
const G = {
  running: false,
  paused: false,
  upgrading: false,
  time: 0,
  kills: 0,
  player: null,
  enemies: [],
  gems: [],
  particles: [],
  ambientParticles: [],
  pulseVisuals: [],
  shakeAmount: 0,
  // Player stats
  hp: 100, maxHp: 100,
  xp: 0, xpToNext: 10, level: 1,
  speed: 5,
  atkDamage: 20,
  atkRange: 3.5,
  atkCooldown: 1.2,
  atkTimer: 0,
  // Difficulty
  spawnInterval: 2.5,
  spawnTimer: 0,
  enemyHpBase: 30,
  enemySpeed: 2.0,
  enemiesPerSpawn: 2,
};

const keys = {};
const clock = new THREE.Clock();

/* ═══════════════════════════════════════════
   THREE.JS SETUP
   ═══════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 40, 70);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 18, 14);
camera.lookAt(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xfff0f5, 0.7);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -30; dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30; dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xfce4ec, 0xc8e6c9, 0.5);
scene.add(hemiLight);

/* ═══════════════════════════════════════════
   ARENA (CUTE MEADOW)
   ═══════════════════════════════════════════ */
function createArena() {
  // Ground
  const groundGeo = new THREE.CircleGeometry(40, 64);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0xa8e6a1 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Decorative flowers
  const flowerColors = [0xff9ecb, 0xffe082, 0xb39ddb, 0x80deea, 0xf48fb1];
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 5 + Math.random() * 32;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;

    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.4, 6),
      new THREE.MeshLambertMaterial({ color: 0x66bb6a })
    );
    stem.position.set(x, 0.2, z);
    scene.add(stem);

    const petal = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 8, 8),
      new THREE.MeshLambertMaterial({ color: flowerColors[i % flowerColors.length] })
    );
    petal.position.set(x, 0.45, z);
    petal.scale.y = 0.6;
    scene.add(petal);
  }

  // Small bushes
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 8 + Math.random() * 28;
    const bush = new THREE.Mesh(
      new THREE.SphereGeometry(0.5 + Math.random() * 0.4, 8, 8),
      new THREE.MeshLambertMaterial({ color: 0x81c784 })
    );
    bush.position.set(Math.cos(angle) * dist, 0.35, Math.sin(angle) * dist);
    bush.scale.y = 0.7;
    bush.castShadow = true;
    scene.add(bush);
  }
}

/* ═══════════════════════════════════════════
   CHIBI CHARACTER BUILDER
   ═══════════════════════════════════════════ */
function createChibiCharacter(bodyColor, eyeColor, blushColor, scale = 1) {
  const group = new THREE.Group();

  // Head (big sphere)
  const headGeo = new THREE.SphereGeometry(0.55, 16, 16);
  const headMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.3;
  head.castShadow = true;
  group.add(head);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
  const eyeMat = new THREE.MeshLambertMaterial({ color: eyeColor });
  const eyeWhiteGeo = new THREE.SphereGeometry(0.13, 8, 8);
  const eyeWhiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

  for (const side of [-1, 1]) {
    const eyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    eyeWhite.position.set(side * 0.18, 1.35, 0.45);
    group.add(eyeWhite);
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(side * 0.18, 1.35, 0.5);
    group.add(eye);
  }

  // Eye shine
  const shineGeo = new THREE.SphereGeometry(0.04, 6, 6);
  const shineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  for (const side of [-1, 1]) {
    const shine = new THREE.Mesh(shineGeo, shineMat);
    shine.position.set(side * 0.18 + 0.04, 1.39, 0.52);
    group.add(shine);
  }

  // Blush
  const blushGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const blushMat = new THREE.MeshLambertMaterial({ color: blushColor, transparent: true, opacity: 0.6 });
  for (const side of [-1, 1]) {
    const blush = new THREE.Mesh(blushGeo, blushMat);
    blush.position.set(side * 0.35, 1.22, 0.4);
    blush.scale.set(1.2, 0.7, 0.5);
    group.add(blush);
  }

  // Smile
  const smileCurve = new THREE.EllipseCurve(0, 0, 0.1, 0.06, 0, Math.PI, false, 0);
  const smilePoints = smileCurve.getPoints(12);
  const smileGeo = new THREE.BufferGeometry().setFromPoints(smilePoints);
  const smile = new THREE.Line(smileGeo, new THREE.LineBasicMaterial({ color: eyeColor, linewidth: 2 }));
  smile.position.set(0, 1.2, 0.53);
  group.add(smile);

  // Body (small)
  const bodyGeo = new THREE.SphereGeometry(0.35, 12, 12);
  const bodyMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  body.scale.set(1, 1.2, 0.9);
  body.castShadow = true;
  group.add(body);

  // Tiny arms
  const armGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const armMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  for (const side of [-1, 1]) {
    const arm = new THREE.Mesh(armGeo, armMat);
    arm.position.set(side * 0.4, 0.65, 0);
    arm.scale.set(0.8, 1.3, 0.8);
    group.add(arm);
  }

  // Tiny legs
  const legGeo = new THREE.SphereGeometry(0.13, 8, 8);
  const legMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  for (const side of [-1, 1]) {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(side * 0.15, 0.15, 0);
    leg.scale.set(1, 1.2, 1);
    group.add(leg);
  }

  // Shadow blob
  const shadowGeo = new THREE.CircleGeometry(0.45, 16);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.15 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.02;
  group.add(shadow);

  group.scale.setScalar(scale);
  return group;
}

/* ═══════════════════════════════════════════
   CREATE PLAYER
   ═══════════════════════════════════════════ */
function createPlayer() {
  const player = createChibiCharacter(0xffb3d9, 0x4a2040, 0xff6b9d, 1);

  // Little crown/hat (cute accessory)
  const hatGeo = new THREE.ConeGeometry(0.2, 0.3, 6);
  const hatMat = new THREE.MeshLambertMaterial({ color: 0xffd54f });
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.set(0, 1.9, 0);
  player.add(hat);

  // Star on top of hat
  const starGeo = new THREE.SphereGeometry(0.06, 6, 6);
  const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const star = new THREE.Mesh(starGeo, starMat);
  star.position.set(0, 2.1, 0);
  player.add(star);

  player.position.y = 0;
  scene.add(player);
  G.player = player;
  G.player.userData.bobTime = 0;
}

/* ═══════════════════════════════════════════
   ENEMY SYSTEM
   ═══════════════════════════════════════════ */
const enemyTemplates = [
  { color: 0xce93d8, eye: 0x4a148c, blush: 0xf48fb1, hpMult: 1 },   // Purple blob
  { color: 0x80deea, eye: 0x006064, blush: 0x4dd0e1, hpMult: 1.2 },  // Blue blob
  { color: 0xa5d6a7, eye: 0x1b5e20, blush: 0x81c784, hpMult: 0.8 },  // Green blob
  { color: 0xffcc80, eye: 0xe65100, blush: 0xffab91, hpMult: 1.5 },  // Orange blob
];

function createEnemy() {
  const tmpl = enemyTemplates[Math.floor(Math.random() * enemyTemplates.length)];

  const group = new THREE.Group();

  // Squishy body (big sphere = slime blob)
  const bodyGeo = new THREE.SphereGeometry(0.45, 12, 12);
  const bodyMat = new THREE.MeshLambertMaterial({ color: tmpl.color });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.4;
  body.scale.set(1, 0.85, 1);
  body.castShadow = true;
  group.add(body);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const eyeMat = new THREE.MeshLambertMaterial({ color: tmpl.eye });
  const eyeWhiteGeo = new THREE.SphereGeometry(0.11, 8, 8);
  const eyeWhiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  for (const side of [-1, 1]) {
    const ew = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    ew.position.set(side * 0.15, 0.5, 0.35);
    group.add(ew);
    const e = new THREE.Mesh(eyeGeo, eyeMat);
    e.position.set(side * 0.15, 0.5, 0.4);
    group.add(e);
  }

  // Smile
  const smileCurve = new THREE.EllipseCurve(0, 0, 0.08, 0.04, 0, Math.PI, false, 0);
  const smilePoints = smileCurve.getPoints(10);
  const smileGeo = new THREE.BufferGeometry().setFromPoints(smilePoints);
  const smile = new THREE.Line(smileGeo, new THREE.LineBasicMaterial({ color: tmpl.eye }));
  smile.position.set(0, 0.38, 0.42);
  group.add(smile);

  // Blush
  const blushGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const blushMat = new THREE.MeshLambertMaterial({ color: tmpl.blush, transparent: true, opacity: 0.5 });
  for (const side of [-1, 1]) {
    const bl = new THREE.Mesh(blushGeo, blushMat);
    bl.position.set(side * 0.3, 0.4, 0.3);
    bl.scale.set(1, 0.6, 0.5);
    group.add(bl);
  }

  // Shadow
  const shadowGeo = new THREE.CircleGeometry(0.35, 12);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.12 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.02;
  group.add(shadow);

  // HP bar above enemy
  const hpBarBg = new THREE.Mesh(
    new THREE.PlaneGeometry(0.7, 0.08),
    new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.6 })
  );
  hpBarBg.position.set(0, 1.0, 0);
  hpBarBg.lookAt(camera.position);
  group.add(hpBarBg);

  const hpBarFill = new THREE.Mesh(
    new THREE.PlaneGeometry(0.68, 0.06),
    new THREE.MeshBasicMaterial({ color: 0xff6b9d })
  );
  hpBarFill.position.set(0, 1.0, 0.001);
  group.add(hpBarFill);
  group.userData.hpBarFill = hpBarFill;
  group.userData.hpBarBg = hpBarBg;

  // Spawn from edges
  const angle = Math.random() * Math.PI * 2;
  const dist = 25 + Math.random() * 10;
  group.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);

  const diffMult = 1 + G.time / 120; // increases over 2 minutes
  group.userData = {
    hp: G.enemyHpBase * tmpl.hpMult * diffMult,
    maxHp: G.enemyHpBase * tmpl.hpMult * diffMult,
    speed: G.enemySpeed * (0.8 + Math.random() * 0.4),
    bobTime: Math.random() * Math.PI * 2,
    dying: false,
    deathTimer: 0,
  };

  scene.add(group);
  G.enemies.push(group);
}

/* ═══════════════════════════════════════════
   XP GEM
   ═══════════════════════════════════════════ */
function createGem(pos) {
  const group = new THREE.Group();

  const geo = new THREE.OctahedronGeometry(0.18, 0);
  const mat = new THREE.MeshLambertMaterial({ color: 0x64ffda, emissive: 0x64ffda, emissiveIntensity: 0.3 });
  const crystal = new THREE.Mesh(geo, mat);
  crystal.castShadow = true;
  group.add(crystal);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.2, 0.35, 16);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x64ffda, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  group.add(ring);

  group.position.copy(pos);
  group.position.y = 0.5;
  group.userData = { bobTime: Math.random() * Math.PI * 2, attracted: false, crystal, ring };
  scene.add(group);
  G.gems.push(group);
}

/* ═══════════════════════════════════════════
   PARTICLES
   ═══════════════════════════════════════════ */
function spawnParticles(pos, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.06 + Math.random() * 0.06, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    p.userData = {
      vx: Math.cos(angle) * speed,
      vy: 2 + Math.random() * 4,
      vz: Math.sin(angle) * speed,
      life: 0.5 + Math.random() * 0.5,
    };
    scene.add(p);
    G.particles.push(p);
  }
}

function spawnDamageNumber(pos, damage) {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 48px Nunito, sans-serif';
  ctx.fillStyle = '#ffd54f';
  ctx.strokeStyle = '#4a2040';
  ctx.lineWidth = 4;
  ctx.textAlign = 'center';
  ctx.strokeText(Math.round(damage), 64, 48);
  ctx.fillText(Math.round(damage), 64, 48);

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(pos);
  sprite.position.y += 1.2;
  sprite.scale.set(1.2, 0.6, 1);
  sprite.userData = { vy: 2.5, life: 0.8 };
  scene.add(sprite);
  G.particles.push(sprite);
}

function spawnHeartParticle(pos) {
  // Simple heart shape using a small sphere with pink color
  const geo = new THREE.SphereGeometry(0.08, 6, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff6b9d, transparent: true, opacity: 0.8 });
  const p = new THREE.Mesh(geo, mat);
  p.position.copy(pos);
  p.userData = { vy: 0.8 + Math.random() * 0.5, life: 1.5 + Math.random() };
  scene.add(p);
  G.particles.push(p);
}

/* ═══════════════════════════════════════════
   AMBIENT PARTICLES (hearts, stars, sparkles)
   ═══════════════════════════════════════════ */
function initAmbientParticles() {
  const colors = [0xffb3d9, 0xffe082, 0xb39ddb, 0x80deea, 0xffffff];
  for (let i = 0; i < 30; i++) {
    const geo = new THREE.SphereGeometry(0.04 + Math.random() * 0.04, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color: colors[i % colors.length], transparent: true, opacity: 0.4 + Math.random() * 0.3 });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(
      (Math.random() - 0.5) * 50,
      2 + Math.random() * 8,
      (Math.random() - 0.5) * 50
    );
    p.userData = {
      baseY: p.position.y,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.5,
      drift: (Math.random() - 0.5) * 0.5,
    };
    scene.add(p);
    G.ambientParticles.push(p);
  }
}

/* ═══════════════════════════════════════════
   PULSE VISUAL (AOE attack ring)
   ═══════════════════════════════════════════ */
function createPulseVisual() {
  const geo = new THREE.RingGeometry(0.2, G.atkRange, 32);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xff6b9d, transparent: true, opacity: 0.4, side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.copy(G.player.position);
  ring.position.y = 0.1;
  ring.userData = { life: 0.3 };
  scene.add(ring);
  G.pulseVisuals.push(ring);
}

/* ═══════════════════════════════════════════
   UPGRADE SYSTEM
   ═══════════════════════════════════════════ */
const upgrades = [
  { icon: '⚔️', name: 'Attack Damage', desc: '+25% damage', apply: () => { G.atkDamage *= 1.25; } },
  { icon: '💨', name: 'Move Speed', desc: '+15% speed', apply: () => { G.speed *= 1.15; } },
  { icon: '⏩', name: 'Attack Speed', desc: '+20% atk speed', apply: () => { G.atkCooldown *= 0.8; } },
  { icon: '💖', name: 'Max HP', desc: '+30 max HP', apply: () => { G.maxHp += 30; G.hp = Math.min(G.hp + 30, G.maxHp); } },
  { icon: '🌀', name: 'AOE Range', desc: '+20% range', apply: () => { G.atkRange *= 1.2; } },
];

function showUpgradeScreen() {
  G.upgrading = true;
  const screen = document.getElementById('upgrade-screen');
  const choices = document.getElementById('upgrade-choices');
  choices.innerHTML = '';

  // Pick 3 random upgrades
  const shuffled = [...upgrades].sort(() => Math.random() - 0.5).slice(0, 3);
  for (const up of shuffled) {
    const card = document.createElement('div');
    card.className = 'upgrade-card';
    card.innerHTML = `<div class="icon">${up.icon}</div><div class="name">${up.name}</div><div class="desc">${up.desc}</div>`;
    card.onclick = () => {
      up.apply();
      G.upgrading = false;
      screen.style.display = 'none';
    };
    choices.appendChild(card);
  }
  screen.style.display = 'flex';
}

/* ═══════════════════════════════════════════
   HUD UPDATE
   ═══════════════════════════════════════════ */
function updateHUD() {
  const min = Math.floor(G.time / 60).toString().padStart(2, '0');
  const sec = Math.floor(G.time % 60).toString().padStart(2, '0');
  document.getElementById('hud-time').textContent = `${min}:${sec}`;
  document.getElementById('hud-kills').textContent = `Kills: ${G.kills}`;

  const hpPct = Math.max(0, G.hp / G.maxHp * 100);
  document.querySelector('#hp-bar .bar-fill').style.width = hpPct + '%';
  document.getElementById('hp-label').textContent = `HP  ${Math.ceil(G.hp)} / ${G.maxHp}`;

  const xpPct = G.xp / G.xpToNext * 100;
  document.querySelector('#xp-bar .bar-fill').style.width = xpPct + '%';
  document.getElementById('xp-label').textContent = `XP — Lv ${G.level}`;
}

/* ═══════════════════════════════════════════
   GAME LOOP
   ═══════════════════════════════════════════ */
const cameraOffset = new THREE.Vector3(0, 18, 14);
const cameraTarget = new THREE.Vector3();

function update(dt) {
  if (!G.running || G.paused || G.upgrading) return;

  G.time += dt;

  // ── Player Movement ──
  const moveDir = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp']) moveDir.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) moveDir.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft']) moveDir.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) moveDir.x += 1;

  if (moveDir.length() > 0) {
    moveDir.normalize();
    G.player.position.x += moveDir.x * G.speed * dt;
    G.player.position.z += moveDir.z * G.speed * dt;

    // Face movement direction
    const targetAngle = Math.atan2(moveDir.x, moveDir.z);
    G.player.rotation.y = THREE.MathUtils.lerp(G.player.rotation.y, targetAngle, 0.15);
  }

  // Clamp to arena
  const arenaRadius = 38;
  const dist = Math.sqrt(G.player.position.x ** 2 + G.player.position.z ** 2);
  if (dist > arenaRadius) {
    G.player.position.x *= arenaRadius / dist;
    G.player.position.z *= arenaRadius / dist;
  }

  // Player bob
  G.player.userData.bobTime += dt * 5;
  G.player.position.y = Math.sin(G.player.userData.bobTime) * 0.05;

  // ── Auto-Attack ──
  G.atkTimer -= dt;
  if (G.atkTimer <= 0) {
    G.atkTimer = G.atkCooldown;
    let hit = false;
    for (const enemy of G.enemies) {
      if (enemy.userData.dying) continue;
      const d = G.player.position.distanceTo(enemy.position);
      if (d <= G.atkRange) {
        enemy.userData.hp -= G.atkDamage;
        hit = true;
        spawnDamageNumber(enemy.position, G.atkDamage);
        // Flash white briefly
        enemy.children.forEach(c => {
          if (c.material && c.material.color) {
            const orig = c.material.color.getHex();
            c.material.color.setHex(0xffffff);
            setTimeout(() => { if (c.material) c.material.color.setHex(orig); }, 80);
          }
        });
      }
    }
    if (hit) createPulseVisual();
  }

  // ── Enemy Spawning ──
  // Difficulty scaling
  const difficultyTime = G.time;
  G.spawnInterval = Math.max(0.6, 2.5 - difficultyTime / 90);
  G.enemiesPerSpawn = Math.floor(2 + difficultyTime / 30);
  G.enemySpeed = 2.0 + difficultyTime / 120;

  G.spawnTimer -= dt;
  if (G.spawnTimer <= 0) {
    G.spawnTimer = G.spawnInterval;
    const count = G.enemiesPerSpawn + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) createEnemy();
  }

  // ── Enemy AI ──
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const enemy = G.enemies[i];

    if (enemy.userData.dying) {
      enemy.userData.deathTimer -= dt;
      const s = Math.max(0, enemy.userData.deathTimer / 0.3);
      enemy.scale.setScalar(s);
      if (enemy.userData.deathTimer <= 0) {
        scene.remove(enemy);
        G.enemies.splice(i, 1);
      }
      continue;
    }

    // Move toward player
    const dir = new THREE.Vector3().subVectors(G.player.position, enemy.position).normalize();
    enemy.position.x += dir.x * enemy.userData.speed * dt;
    enemy.position.z += dir.z * enemy.userData.speed * dt;

    // Face player
    enemy.rotation.y = Math.atan2(dir.x, dir.z);

    // Bob
    enemy.userData.bobTime += dt * 4;
    enemy.position.y = Math.sin(enemy.userData.bobTime) * 0.06;

    // Update HP bar
    if (enemy.userData.hpBarFill) {
      const hpPct = Math.max(0, enemy.userData.hp / enemy.userData.maxHp);
      enemy.userData.hpBarFill.scale.x = hpPct;
      enemy.userData.hpBarFill.position.x = -(1 - hpPct) * 0.34;
      // Billboard HP bars toward camera
      enemy.userData.hpBarBg.quaternion.copy(camera.quaternion);
      enemy.userData.hpBarFill.quaternion.copy(camera.quaternion);
      // Color based on HP
      if (hpPct < 0.3) enemy.userData.hpBarFill.material.color.setHex(0xff4444);
      else if (hpPct < 0.6) enemy.userData.hpBarFill.material.color.setHex(0xffab40);
      else enemy.userData.hpBarFill.material.color.setHex(0xff6b9d);
    }

    // Damage player on contact
    const d = G.player.position.distanceTo(enemy.position);
    if (d < 1.0) {
      G.hp -= 15 * dt;
      G.shakeAmount = 0.3;
      // Push enemy back slightly
      enemy.position.x -= dir.x * 2 * dt;
      enemy.position.z -= dir.z * 2 * dt;
    }

    // Check death
    if (enemy.userData.hp <= 0 && !enemy.userData.dying) {
      enemy.userData.dying = true;
      enemy.userData.deathTimer = 0.3;
      G.kills++;
      spawnParticles(enemy.position, 0xffd54f, 6);
      createGem(enemy.position);
    }
  }

  // ── Gems ──
  for (let i = G.gems.length - 1; i >= 0; i--) {
    const gem = G.gems[i];
    gem.userData.bobTime += dt * 3;
    gem.position.y = 0.5 + Math.sin(gem.userData.bobTime) * 0.15;
    if (gem.userData.crystal) {
      gem.userData.crystal.rotation.y += dt * 3;
      gem.userData.crystal.rotation.x += dt * 1.5;
    }
    if (gem.userData.ring) {
      gem.userData.ring.material.opacity = 0.15 + Math.sin(gem.userData.bobTime * 2) * 0.1;
      const rs = 1 + Math.sin(gem.userData.bobTime * 2) * 0.15;
      gem.userData.ring.scale.setScalar(rs);
    }

    const d = G.player.position.distanceTo(gem.position);
    // Attract when close
    if (d < 3) {
      gem.userData.attracted = true;
    }
    if (gem.userData.attracted) {
      const dir = new THREE.Vector3().subVectors(G.player.position, gem.position).normalize();
      const attractSpeed = 10;
      gem.position.x += dir.x * attractSpeed * dt;
      gem.position.z += dir.z * attractSpeed * dt;
    }

    // Collect
    if (d < 0.8) {
      scene.remove(gem);
      G.gems.splice(i, 1);
      G.xp++;
      spawnParticles(gem.position, 0x64ffda, 4);

      // Level up
      if (G.xp >= G.xpToNext) {
        G.xp = 0;
        G.level++;
        G.xpToNext = Math.floor(G.xpToNext * 1.5);
        showUpgradeScreen();
        // Celebration burst
        for (let j = 0; j < 5; j++) spawnHeartParticle(G.player.position);
        spawnParticles(G.player.position, 0xffd54f, 12);
        spawnParticles(G.player.position, 0xff6b9d, 8);
      }
    }
  }

  // ── Particles ──
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      G.particles.splice(i, 1);
      continue;
    }
    if (p.userData.vx !== undefined) {
      p.position.x += p.userData.vx * dt;
      p.position.y += p.userData.vy * dt;
      p.position.z += p.userData.vz * dt;
      p.userData.vy -= 9 * dt; // gravity
    } else {
      p.position.y += p.userData.vy * dt;
    }
    p.material.opacity = p.userData.life / 1.0;
  }

  // ── Pulse Visuals ──
  for (let i = G.pulseVisuals.length - 1; i >= 0; i--) {
    const pv = G.pulseVisuals[i];
    pv.userData.life -= dt;
    if (pv.userData.life <= 0) {
      scene.remove(pv);
      G.pulseVisuals.splice(i, 1);
      continue;
    }
    pv.material.opacity = pv.userData.life / 0.3 * 0.3;
    const s = 1 + (1 - pv.userData.life / 0.3) * 0.5;
    pv.scale.setScalar(s);
  }

  // ── Ambient Particles ──
  for (const ap of G.ambientParticles) {
    ap.userData.phase += dt * ap.userData.speed;
    ap.position.y = ap.userData.baseY + Math.sin(ap.userData.phase) * 0.5;
    ap.position.x += ap.userData.drift * dt;
    if (Math.abs(ap.position.x) > 30) ap.userData.drift *= -1;
  }

  // ── Camera Follow ──
  cameraTarget.copy(G.player.position).add(cameraOffset);
  camera.position.lerp(cameraTarget, 3 * dt);

  // Camera shake
  if (G.shakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * G.shakeAmount;
    camera.position.z += (Math.random() - 0.5) * G.shakeAmount;
    G.shakeAmount *= 0.9;
    if (G.shakeAmount < 0.01) G.shakeAmount = 0;
  }

  camera.lookAt(G.player.position.x, 0, G.player.position.z);

  // ── Game Over ──
  if (G.hp <= 0) {
    G.hp = 0;
    gameOver();
  }

  updateHUD();
}

/* ═══════════════════════════════════════════
   GAME LIFECYCLE
   ═══════════════════════════════════════════ */
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';

  // Clear old state
  for (const e of G.enemies) scene.remove(e);
  for (const g of G.gems) scene.remove(g);
  for (const p of G.particles) scene.remove(p);
  for (const pv of G.pulseVisuals) scene.remove(pv);
  G.enemies = [];
  G.gems = [];
  G.particles = [];
  G.pulseVisuals = [];

  if (G.player) scene.remove(G.player);

  // Reset stats
  G.hp = 100; G.maxHp = 100;
  G.xp = 0; G.xpToNext = 10; G.level = 1;
  G.speed = 5; G.atkDamage = 20; G.atkRange = 3.5; G.atkCooldown = 1.2; G.atkTimer = 0;
  G.spawnInterval = 2.5; G.spawnTimer = 1; G.enemyHpBase = 30; G.enemySpeed = 2.0; G.enemiesPerSpawn = 2;
  G.time = 0; G.kills = 0;
  G.paused = false; G.upgrading = false;
  G.shakeAmount = 0;

  createPlayer();
  G.running = true;
  clock.getDelta(); // reset clock
}

function gameOver() {
  G.running = false;

  // High score
  const prevBest = parseInt(localStorage.getItem('survivor-highscore') || '0');
  const score = G.kills;
  const isNew = score > prevBest;
  if (isNew) localStorage.setItem('survivor-highscore', score.toString());

  const prevTime = parseFloat(localStorage.getItem('survivor-besttime') || '0');
  if (G.time > prevTime) localStorage.setItem('survivor-besttime', G.time.toString());

  const min = Math.floor(G.time / 60).toString().padStart(2, '0');
  const sec = Math.floor(G.time % 60).toString().padStart(2, '0');

  document.getElementById('gameover-stats').innerHTML = `
    Survived: <span>${min}:${sec}</span><br>
    Kills: <span>${G.kills}</span><br>
    Level: <span>${G.level}</span><br>
    Best Kills: <span>${Math.max(score, prevBest)}</span>
  `;
  document.getElementById('high-score-msg').style.display = isNew ? 'block' : 'none';
  document.getElementById('gameover-screen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
}

function togglePause() {
  if (!G.running || G.upgrading) return;
  G.paused = !G.paused;
  document.getElementById('pause-screen').style.display = G.paused ? 'flex' : 'none';
  if (!G.paused) clock.getDelta(); // reset delta so no huge jump
}

/* ═══════════════════════════════════════════
   INPUT
   ═══════════════════════════════════════════ */
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape' || e.code === 'KeyP') togglePause();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

/* ═══════════════════════════════════════════
   INIT & RENDER LOOP
   ═══════════════════════════════════════════ */
createArena();
initAmbientParticles();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05); // cap delta
  update(dt);
  renderer.render(scene, camera);
}
animate();
</script>
